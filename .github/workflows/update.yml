name: Update results

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch latest results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-results.js
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "results-bot"
            git config user.email "actions@users.noreply.github.com"
            git add results.json
            git commit -m "Update results"
            git push
          else
            echo "No changes today."
          fi
